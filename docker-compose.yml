services:
  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - 11434:11434
    environment:
      - OLLAMA_DEBUG=1
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_MAX_LOADED_MODELS=1
    volumes:
      - prompt_eval_ollama:/root/.ollama
    networks:
      - prompt_eval_network
    restart: always
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    ports:
      - 8080:8080
    environment:
      - ENV=dev
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - prompt_eval_open-webui:/app/backend/data
    depends_on:
      - ollama
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - prompt_eval_network
    restart: always

networks:
  prompt_eval_network:
    driver: bridge

volumes:
  prompt_eval_ollama:
  prompt_eval_open-webui:
